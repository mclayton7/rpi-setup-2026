# tmux configuration

# Start new windows/panes with bash, as a login shell so /etc/profile.d
# (colored prompt + QoL settings) is sourced inside every pane.
set -g default-shell /bin/bash
set -g default-command "/bin/bash -l"

# Set terminal
set -g default-terminal "screen-256color"

# Improve colors
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:RGB"

# Set scrollback history
set -g history-limit 10000

# Set window and pane index to 1 (0 is default)
set -g base-index 1
setw -g pane-base-index 1

# Reload config file
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Use Ctrl-a as the prefix key instead of Ctrl-b
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Enable mouse support
set -g mouse on

# Status bar
set -g status-bg black
set -g status-fg white
set -g status-left "#[fg=green]#h #[fg=yellow]#S"
set -g status-right "#[fg=cyan]%d %b %R"
