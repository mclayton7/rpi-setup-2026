---
- name: Fail on unsupported OS
  assert:
    that:
      - ansible_distribution == "Ubuntu"
      - ansible_distribution_version is version('24.04', '>=')
    fail_msg: >-
      The docker role supports Ubuntu 24.04 and 26.04 only
      (detected {{ ansible_distribution }} {{ ansible_distribution_version }}).

- name: Install Docker apt repository prerequisites
  apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Add Docker's official GPG key
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: '0644'

- name: Determine dpkg architecture
  command: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false
  check_mode: false

- name: Add Docker apt repository (docker-ce)
  apt_repository:
    repo: >-
      deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: yes

- name: Install Docker Engine and plugins
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Ensure Docker service is started and enabled
  service:
    name: docker
    state: started
    enabled: yes

- name: Add deploy user to the docker group
  user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: yes
  notify: Warn about docker group re-login
