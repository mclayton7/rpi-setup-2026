---
- name: Install base packages
  apt:
    name:
      - skopeo      # container image inspection / copy
      - htop        # interactive process viewer
      - iproute2    # provides the `ss` socket statistics tool
      - jq          # JSON filtering for `docker inspect` output
      - ncdu        # disk-usage TUI (track /var/lib/docker growth)
      - pigz        # parallel gzip; used by docker save/load/commit
      - nmap        # network/port scanner
      - vim         # text editor
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Check current default editor alternative
  command: update-alternatives --query editor
  register: editor_alt
  changed_when: false

- name: Make vim the system default editor
  command: update-alternatives --set editor /usr/bin/vim.basic
  when: "'Value: /usr/bin/vim.basic' not in editor_alt.stdout"
