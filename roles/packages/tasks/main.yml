---
- name: Install base packages
  apt:
    name:
      - skopeo      # container image inspection / copy
      - htop        # interactive process viewer
      - iproute2    # provides the `ss` socket statistics tool
      - jq          # JSON filtering for `docker inspect` output
      - ncdu        # disk-usage TUI (track /var/lib/docker growth)
      - pigz        # parallel gzip; used by docker save/load/commit
    state: present
    update_cache: yes
    cache_valid_time: 3600
