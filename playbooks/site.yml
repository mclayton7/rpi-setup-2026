---
- name: Configure Raspberry Pis
  hosts: raspberry_pis
  gather_facts: yes
  vars:
    ansible_python_interpreter: /usr/bin/python3

  roles:
    - sudo
    - tmux
    - bash-prompt
    - packages
    - docker
    - container-tools
    - k3s

  post_tasks:
    - name: Display success message
      debug:
        msg: "Successfully configured {{ inventory_hostname }} with passwordless sudo, tmux, colored bash prompt, base packages, Docker, container tools, and k3s"
